# Lite fine-tune of pretrained S1 — designed to keep generalization
# Strategy: low LR (5x lower), few epochs (10), save every epoch for picking sweet spot
data:
  max_eval_sample: 8
  max_sec: 54
  num_workers: 2
  pad_val: 1024
inference:
  top_k: 5
model:
  EOS: 1024
  dropout: 0
  embedding_dim: 512
  head: 16
  hidden_dim: 512
  linear_units: 2048
  n_layer: 24
  phoneme_vocab_size: 732
  random_bert: 0
  vocab_size: 1025
optimizer:
  decay_steps: 40000
  lr: 0.001              # 10x lower than the 0.01 we used before
  lr_end: 0.00001
  lr_init: 1.0e-06       # tiny warmup start
  warmup_steps: 500      # quick warmup
output_dir: /Users/kaede/tts/tai_voice_prepared/s1_lite_logs
pretrained_s1: /Users/kaede/tts/GPT-SoVITS/GPT_SoVITS/pretrained_models/s1v3.ckpt
train:
  batch_size: 4
  epochs: 20             # short — pick best epoch via eval
  exp_name: s1_tai_lite
  gradient_clip: 1.0
  half_weights_save_dir: /Users/kaede/tts/tai_voice_prepared/s1_lite_ckpt
  if_save_every_weights: true
  if_save_latest: false  # KEEP every epoch's ckpt for sweep
  precision: 32
  pretrained_s1: /Users/kaede/tts/GPT-SoVITS/GPT_SoVITS/pretrained_models/s1v3.ckpt
  save_every_n_epoch: 1
  seed: 1234
train_phoneme_path: /Users/kaede/tts/tai_voice_prepared/2-name2text.txt
train_semantic_path: /Users/kaede/tts/tai_voice_prepared/6-name2semantic_all.tsv
